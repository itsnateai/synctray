name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore SyncthingTray/SyncthingTray.csproj

      - name: Build
        run: dotnet build SyncthingTray/SyncthingTray.csproj -c Release --no-restore

      - name: Publish single-file
        run: dotnet publish SyncthingTray/SyncthingTray.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SyncthingTray-win-x64
          path: SyncthingTray/bin/Release/net8.0-windows/win-x64/publish/SyncthingTray.exe
