name: WinGet Submit

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to submit (e.g. v1.2.3)"
        required: true

permissions:
  contents: read

env:
  PACKAGE_IDENTIFIER: itsnateai.SyncthingTray
  ASSET_NAME: SyncthingTray.exe

jobs:
  submit:
    runs-on: windows-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'release') {
            $t = '${{ github.event.release.tag_name }}'
          } else {
            $t = '${{ github.event.inputs.tag }}'
          }
          if (-not $t.StartsWith('v')) { throw "Tag must start with v" }
          $ver = $t.Substring(1)
          echo "TAG=$t"       >> $env:GITHUB_OUTPUT
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved tag=$t version=$ver"

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          Get-FileHash wingetcreate.exe -Algorithm SHA256

      - name: Submit PR
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"
          $ver = "${{ steps.tag.outputs.VERSION }}"
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$env:ASSET_NAME"
          Write-Host "Submitting $env:PACKAGE_IDENTIFIER v$ver from $url"
          ./wingetcreate.exe update $env:PACKAGE_IDENTIFIER `
            --version $ver `
            --urls $url `
            --submit `
            --token "${{ secrets.WINGET_PAT }}"
