name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in csproj
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $csproj = Get-Content SyncthingTray/SyncthingTray.csproj -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>$env:VERSION</Version>"
          Set-Content SyncthingTray/SyncthingTray.csproj $csproj

      - name: Build self-contained
        run: dotnet publish SyncthingTray/SyncthingTray.csproj -c Release --self-contained true -r win-x64 -p:PublishSingleFile=true

      - name: Prepare assets
        shell: bash
        run: cp SyncthingTray/bin/Release/net8.0-windows/win-x64/publish/SyncthingTray.exe SyncthingTray.exe

      - name: Generate SHA256SUMS
        shell: bash
        run: sha256sum SyncthingTray.exe > SHA256SUMS

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:VERSION
          $content = Get-Content CHANGELOG.md -Raw
          # Capture the body between `## v<version> â€” <date>` and the next `## v<version>` (or end).
          # SyncTray CHANGELOG uses `## v2.2.6 â€” 2026-04-17` format; subsections use `###`.
          $escaped = [regex]::Escape($version)
          $pattern = "(?ms)^##\s+v$escaped\b[^\n]*\n(.*?)(?=^##\s+v\d|\z)"
          $m = [regex]::Match($content, $pattern)
          if ($m.Success) {
            $notes = $m.Groups[1].Value.Trim()
            Set-Content -Path RELEASE_NOTES.md -Value $notes -Encoding UTF8
            Write-Host "Extracted release notes for v$version ($($notes.Length) chars)"
          } else {
            # Fallback so the release still ships even if the changelog wasn't updated
            Set-Content -Path RELEASE_NOTES.md -Value "See [CHANGELOG.md](https://github.com/itsnateai/synctray/blob/main/CHANGELOG.md) for release notes." -Encoding UTF8
            Write-Host "::warning::No CHANGELOG section found for v$version â€” using fallback body."
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: RELEASE_NOTES.md
          # append_body so the auto-generated "What's Changed" list appears BELOW
          # the human-written notes from CHANGELOG.md, not above or instead of them
          append_body: true
          generate_release_notes: true
          files: |
            SyncthingTray.exe
            SHA256SUMS
