name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in csproj
        shell: pwsh
        run: |
          $csproj = Get-Content SyncthingTray/SyncthingTray.csproj -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>${{ steps.version.outputs.VERSION }}</Version>"
          Set-Content SyncthingTray/SyncthingTray.csproj $csproj

      - name: Build self-contained
        run: dotnet publish SyncthingTray/SyncthingTray.csproj -c Release --self-contained true -r win-x64

      - name: Prepare assets
        shell: bash
        run: cp SyncthingTray/bin/Release/net8.0-windows/win-x64/publish/SyncthingTray.exe SyncthingTray.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: SyncthingTray.exe
