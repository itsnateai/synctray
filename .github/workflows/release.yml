name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in csproj
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $csproj = Get-Content SyncthingPause/SyncthingPause.csproj -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>$env:VERSION</Version>"
          Set-Content SyncthingPause/SyncthingPause.csproj $csproj

      - name: Build self-contained
        run: dotnet publish SyncthingPause/SyncthingPause.csproj -c Release --self-contained true -r win-x64 -p:PublishSingleFile=true

      - name: Prepare assets
        shell: bash
        run: cp SyncthingPause/bin/Release/net8.0-windows/win-x64/publish/SyncthingPause.exe SyncthingPause.exe

      - name: Generate SHA256SUMS
        shell: bash
        run: sha256sum SyncthingPause.exe > SHA256SUMS

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:VERSION
          $content = Get-Content CHANGELOG.md -Raw
          # Capture the body between `## v<version> — <date>` and the next `## v<version>` (or end).
          # SyncthingPause CHANGELOG uses `## v2.2.6 — 2026-04-17` format; subsections use `###`.
          $escaped = [regex]::Escape($version)
          $pattern = "(?ms)^##\s+v$escaped\b[^\n]*\n(.*?)(?=^##\s+v\d|\z)"
          $m = [regex]::Match($content, $pattern)
          if ($m.Success) {
            $notes = $m.Groups[1].Value.Trim()
            Set-Content -Path RELEASE_NOTES.md -Value $notes -Encoding UTF8
            Write-Host "Extracted release notes for v$version ($($notes.Length) chars)"
          } else {
            # Fallback so the release still ships even if the changelog wasn't updated
            Set-Content -Path RELEASE_NOTES.md -Value "See [CHANGELOG.md](https://github.com/itsnateai/syncthingpause/blob/main/CHANGELOG.md) for release notes." -Encoding UTF8
            Write-Host "::warning::No CHANGELOG section found for v$version — using fallback body."
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: RELEASE_NOTES.md
          # append_body so the auto-generated "What's Changed" list appears BELOW
          # the human-written notes from CHANGELOG.md, not above or instead of them
          append_body: true
          generate_release_notes: true
          files: |
            SyncthingPause.exe
            SHA256SUMS

      # Post-publish verification — softprops/action-gh-release reports
      # "Uploaded ..." on push but only guarantees the upload-API call
      # returned 2xx. The step below fetches the release back and asserts
      # both expected assets are present, state=uploaded, and the release
      # is not a draft. SCOPE: catches CI-window failure modes (action bug,
      # eventual-consistency hiccup, concurrent re-run race, edits during
      # the ~25s retry window). It does NOT catch a human clobbering assets
      # via `gh release upload --clobber` or the web UI 30s / 30 days later
      # — that's out of scope here. RETRY_MAX × RETRY_SLEEP is the total
      # wait budget for GH's asset-list eventual consistency (default 5×5s
      # = 25s); bump if a repo regularly exceeds that propagation.
      - name: Verify both assets persisted on the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          PRIMARY_ASSET: SyncthingPause.exe
          RETRY_MAX: '5'
          RETRY_SLEEP: '5'
        run: |
          set -euo pipefail
          attempt=0
          JSON=''
          PRI_STATE=''
          SUM_STATE=''
          IS_DRAFT=''
          while [ "$attempt" -lt "$RETRY_MAX" ]; do
            attempt=$((attempt+1))
            # Non-fatal gh api so a transient 5xx / rate-limit doesn't kill
            # the loop before the retry budget is consumed. stderr is folded
            # into the buffer so the error body lands in $JSON for the final
            # diagnostics dump (no separate reset path).
            if ! JSON=$(gh api "repos/${REPO}/releases/tags/${TAG}" 2>&1); then
              echo "Attempt ${attempt}/${RETRY_MAX}: gh api non-zero — keeping response body for diagnostics. Head: ${JSON:0:200}"
            fi
            PRI_STATE=$(printf '%s' "$JSON" | jq -r --arg n "$PRIMARY_ASSET" '.assets[]? | select(.name==$n) | .state' 2>/dev/null || true)
            SUM_STATE=$(printf '%s' "$JSON" | jq -r '.assets[]? | select(.name=="SHA256SUMS") | .state' 2>/dev/null || true)
            IS_DRAFT=$(printf '%s' "$JSON" | jq -r '.draft // empty' 2>/dev/null || true)
            if [ "$PRI_STATE" = "uploaded" ] && [ "$SUM_STATE" = "uploaded" ] && [ "$IS_DRAFT" != "true" ]; then
              echo "::notice::Release ${TAG} verified: ${PRIMARY_ASSET} + SHA256SUMS both present, not draft"
              exit 0
            fi
            echo "Attempt ${attempt}/${RETRY_MAX}: primary=${PRI_STATE:-MISSING} sum=${SUM_STATE:-MISSING} draft=${IS_DRAFT:-?}"
            if [ "$attempt" -lt "$RETRY_MAX" ]; then
              sleep "$RETRY_SLEEP"
            fi
          done
          echo "::error::Release ${TAG} not verified after ${RETRY_MAX} attempts. primary=${PRI_STATE:-MISSING} sum=${SUM_STATE:-MISSING} draft=${IS_DRAFT:-?}"
          echo "--- Last API response or error body (first 2000 chars) ---"
          printf '%s\n' "${JSON:0:2000}"
          exit 1
